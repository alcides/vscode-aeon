$schema: https://raw.githubusercontent.com/martinring/tmlanguage/master/tmlanguage.json
name: Aeon
scopeName: source.aeon
fileTypes: [ae]
patterns:
  - include: "#comments"
  - include: "#literals"
  - include: "#functions"
  - include: "#keywords"
  - include: "#operators"
  - include: "#types"
  - match: '\b[a-z][a-zA-Z0-9_]*\b'
    name: entity.name.function.aeon
  - match: '\b[A-Z][a-zA-Z0-9_]*\b'
    name: entity.name.type.aeon

repository:
  comments:
    patterns:
      - name: comment.line.aeon
        match: '#.*$'

  literals:
    patterns:
      - include: "#strings"
      - include: "#numbers"
      - include: "#booleans"
      - include: "#kinds"

  strings:
    name: string.quoted.double.aeon
    begin: '"'
    end: '"'
    patterns:
      - name: constant.character.escape.aeon
        match: \\.

  numbers:
    patterns:
      - name: constant.numeric.float.aeon
        match: '\b\d+\.\d+\b'
      - name: constant.numeric.integer.aeon
        match: '\b\d+\b'

  booleans:
    patterns:
      - name: constant.language.boolean.aeon
        match: \b(true|false)\b

  kinds:
    patterns:
      - name: constant.language.kind.base.aeon
        match: '\bB\b'

  functions:
    patterns:
      - include: "#nativeFunctions"
      - include: "#lambdaFunctions"
      - include: "#kindFunctions"

  nativeFunctions:
    patterns:
      - name: meta.embedded.python.aeon
        begin: '(native)\s+"'
        end: '"'
        captures:
          "1": { name: keyword.other.native.aeon }
        contentName: source.python
        patterns:
          - include: source.python
      - name: meta.native.import.aeon
        begin: '(native_import)\s+"'
        end: '"'
        beginCaptures:
          "1": { name: keyword.other.import.native.aeon }
        contentName: string.quoted.module.python

  lambdaFunctions:
    patterns:
      # Term-level lambda: ``fun x => ...`` or ``fun (x: T) => ...``.
      - match: '\b(fun)\b'
        name: keyword.control.lambda.aeon
      # Unicode lambda: ``λ x => ...`` (entered via the input method as \lambda).
      - match: 'λ'
        name: keyword.control.lambda.aeon

  kindFunctions:
    patterns:
      # Type/refinement abstraction: ``Λ a : k => ...`` / ``Λ <p : ...> => ...``.
      - match: '(Λ)\s*([a-z][a-zA-Z0-9_]*)?'
        captures:
          "1": { name: keyword.operator.kind.lambda.symbol.aeon }
          "2": { name: kind.parameter.function.lambda.aeon }

  keywords:
    patterns:
      - include: "#imports"
      - include: "#declarations"
      - include: "#macros"
      - include: "#controlKeywords"

  imports:
    patterns:
      # ``import Foo.Bar;`` / ``import Foo.Bar (a, b);`` / ``open Foo.Bar;``
      - match: '\b(import|open)\b\s+([A-Za-z_][A-Za-z0-9_]*(?:\.[A-Za-z_][A-Za-z0-9_]*)*)'
        captures:
          "1": { name: keyword.control.import.aeon }
          "2": { name: entity.name.namespace.aeon }

  declarations:
    patterns:
      # ``def name ...`` and method definitions ``def Int.toString ...``.
      - match: '\b(def)\s+([A-Za-z_][A-Za-z0-9_]*(?:\.[A-Za-z_][A-Za-z0-9_]*)?)'
        captures:
          "1": { name: keyword.declaration.function.aeon }
          "2": { name: entity.name.function.aeon }
      # Type-introducing declarations followed by the type name.
      - match: '\b(type|inductive|class)\s+([A-Za-z_][A-Za-z0-9_]*)'
        captures:
          "1": { name: keyword.declaration.type.aeon }
          "2": { name: entity.name.type.aeon }
      # Declarations whose name (if any) is parsed separately.
      - match: '\b(instance|axiom)\b'
        name: keyword.declaration.aeon
      # ``let 1 x = ...`` / ``let omega x = ...`` (QTT multiplicity binder).
      - match: '\b(let)\s+(0|1|omega|ω)\s+([A-Za-z_][A-Za-z0-9_]*)'
        captures:
          "1": { name: keyword.declaration.let.aeon }
          "2": { name: storage.modifier.multiplicity.aeon }
          "3": { name: variable.declaration.aeon }
      - match: '\b(let)\s+([A-Za-z_][A-Za-z0-9_]*)'
        captures:
          "1": { name: keyword.declaration.let.aeon }
          "2": { name: variable.declaration.aeon }

  macros:
    patterns:
      # Decorator macros: ``@minimize_int(...)``, ``@example``, ...
      - match: '(@)([A-Za-z_][A-Za-z0-9_]*)'
        captures:
          "1": { name: punctuation.definition.tag.aeon }
          "2": { name: entity.name.tag.macro.aeon }

  controlKeywords:
    patterns:
      - match: '\b(forall)\b'
        name: keyword.universal.quantifier.aeon
      # Unicode quantifiers: ``∀ x, ...`` / ``∃ x, ...``.
      - match: '(∀|∃)\s*([a-zA-Z0-9_]+)'
        captures:
          "1": { name: keyword.universal.quantifier.aeon }
          "2": { name: entity.polymorphic.type.macro.aeon }
      - match: '\b(if|then|else|match|with|in|by)\b'
        name: keyword.control.aeon
      - match: '\b(where|extends|decreasing_by)\b'
        name: keyword.control.aeon

  operators:
    patterns:
      - name: keyword.operator.lambda.function.arrow.aeon
        match: '->'
      - name: keyword.operator.lambda.kind.arrow.aeon
        match: '=>'
      - name: keyword.operator.implication.aeon
        match: '-->'
      - name: keyword.operator.assignment.aeon
        match: ':='
      - name: keyword.operator.application.dollar.aeon
        match: '\$'
      - name: punctuation.separator.type
        match: ':'
      - name: keyword.operator.logical.aeon
        match: (\|\||&&|!)
      # Lean-style: ``:=`` is assignment (above); ``=`` and ``==`` are equality.
      - name: keyword.operator.comparison.aeon
        match: (==|>=|<=|!=|>|<|=)
      - name: keyword.operator.arithmetic.aeon
        match: (\+|-|\*|/|%)
      # Unicode operators (entered via the input method, e.g. \to, \and, \le).
      - name: keyword.operator.lambda.function.arrow.aeon
        match: (→|↦|⟶)
      - name: keyword.operator.lambda.kind.arrow.aeon
        match: (⇒|⟹|⇔|↔)
      - name: keyword.operator.logical.aeon
        match: (∧|∨|¬)
      - name: keyword.operator.comparison.aeon
        match: (≤|≥|≠|≡|≈|∈|∉|∋|⊆|⊂|⊇|⊃)
      - name: keyword.operator.arithmetic.aeon
        match: (×|÷|⋅|∘|±|∓)
      - name: punctuation.terminator.statement.aeon
        match: ';'

  types:
    patterns:
      - name: storage.type.primitive.aeon
        match: '\b(Unit|Int|Float|String|Bool)\b'
      - name: keyword.operator.pipe.aeon
        match: '\|'
